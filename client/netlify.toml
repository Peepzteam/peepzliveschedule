[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "../netlify/functions"
  node_bundler = "esbuild"

# ── API & Auth → Netlify Function (ไม่ต้องใช้ Railway แล้ว) ──
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

[[redirects]]
  from = "/auth/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

# ── SPA fallback ─────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
